fault_injector_node:
  ros__parameters:
    input_image_topic: "/camera/image_raw"
    output_image_topic: "/faults/image_raw"
    status_topic: "/debug/fault_injection_status"
    mode: "visual_degradation"
    visual_mode: "blur"
    blur_kernel: 7
    jpeg_quality: 45
    brightness_delta: 20.0
    contrast_alpha: 1.2
    glare_enabled: true
    glare_strength: 0.25
    noise_sigma: 8.0
    deterministic: true
    random_seed: 42
    log_every_n_frames: 30
    use_sim_time: false
