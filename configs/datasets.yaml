version: "0.3"
project: "maritime-perception-replay-bench"

ingest_strategy:
  level_0:
    name: "single_sample_video"
    purpose: "Fast path for validating the ROS2 replay spine."
    status: "active"

  level_1:
    name: "small_curated_clip_set"
    purpose: "Two or three representative maritime clips with manual metadata."
    status: "planned"

  level_2:
    name: "curated_labeled_subset"
    purpose: "Subset from a real dataset with labels for detector/tracker evaluation."
    status: "future"

  level_3:
    name: "full_dataset_eval"
    purpose: "Full dataset preparation and official evaluation path."
    status: "future"

primary_visual:
  name: "sample_maritime_video"
  type: "video"
  path: "data/samples/harbor_sample.mp4"
  labels: null
  fps_override: null
  frame_id: "camera"
  image_topic: "/camera/image_raw"
  notes: "Initial fast path for ROS2 replay spine."

secondary_visual:
  name: "mastr1325_or_lars_subset"
  type: "image_dataset"
  path: "data/raw/secondary_visual"
  labels: "data/labels/secondary_visual"
  status: "optional"
  notes: "Optional water/obstacle prior and maritime failure analysis."

candidate_sources:
  - name: "Singapore Maritime Dataset or accessible maritime sample"
    role: "first replay source"
    status: "preferred_initial_path"

  - name: "SeaDronesSee"
    role: "detection_tracking_candidate"
    status: "candidate_after_replay_works"

  - name: "MaSTr1325"
    role: "water_sky_obstacle_prior"
    status: "future_reference"

acoustic_lane:
  status: "optional_plugin"
  core_mvp: false
  decision: "Do not make acoustic data part of the core MVP."
  reason: "The first goal is to build a stable vision-first ROS2 replay and evaluation spine. Acoustic streams can reuse the same timing, metrics, artifact and replay infrastructure later."
  future_topics:
    waveform: "/acoustic/waveform"
    spectrogram: "/acoustic/spectrogram"
    events: "/acoustic/events"
  candidate_sources:
    - name: "DeepShip"
      role: "future vessel audio classification reference"
      status: "future_reference"

    - name: "ShipsEar"
      role: "future vessel audio research reference"
      status: "future_reference"

    - name: "NOAA Passive Acoustic Data"
      role: "future passive acoustic archive"
      status: "future_reference"

    - name: "SanctSound"
      role: "future passive acoustic archive"
      status: "future_reference"
  interview_position: "The acoustic lane is intentionally kept as an extension point. The first goal is a reproducible replay and evaluation spine; once that is stable, an acoustic stream can use the same timing, artifact and metrics infrastructure."

data_rules:
  commit_large_data: false
  commit_raw_datasets: false
  commit_video_samples: false
  keep_data_local: true
