replay:
  source_type: "video"
  source_path: "data/samples/harbor_sample.mp4"
  publish_rate_hz: null
  loop: false
  use_sim_time: true
  frame_id: "camera_frame"
  scenario_name: "clean_replay"

rosbag:
  output_root: "data/bags"
  default_storage: "mcap"
  record_topics:
    - "/camera/image_raw"
    - "/debug/frame_info"
  optional_topics:
    - "/clock"
